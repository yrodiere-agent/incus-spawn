# incus-spawn VM clock synchronization.
# Corrects multi-hour drift after macOS host sleep/resume.

pool pool.ntp.org iburst

# Always step the clock when offset exceeds 1 second.
# Default chrony only steps during the first 3 updates, then slews.
# A VM that loses hours after host sleep needs unconditional stepping.
makestep 1 -1

driftfile /var/lib/chrony/drift

# Sync kernel RTC (ignored on vfkit which has no RTC, useful on QEMU).
rtcsync

logdir /var/log/chrony
log tracking
