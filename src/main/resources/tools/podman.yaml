name: podman
description: Podman container runtime configured for Testcontainers

packages:
  - podman

run:
  - |
    printf '#!/bin/sh\nexec sudo /usr/bin/podman "$@"\n' > /usr/local/bin/podman &&
    chmod +x /usr/local/bin/podman &&
    ln -sf /usr/local/bin/podman /usr/local/bin/docker
  - |
    systemctl enable --no-reload podman.socket &&
    mkdir -p /run/podman &&
    ln -sf /run/podman/podman.sock /run/docker.sock &&
    printf 'd /run/podman 0755 root root -\nL /run/docker.sock - - - - /run/podman/podman.sock\n' \
      > /etc/tmpfiles.d/podman-socket.conf &&
    mkdir -p /etc/systemd/system/podman.socket.d &&
    printf '[Socket]\nSocketMode=0666\n' \
      > /etc/systemd/system/podman.socket.d/override.conf

env:
  - export DOCKER_HOST=unix:///var/run/docker.sock
  - export TESTCONTAINERS_RYUK_CONTAINER_PRIVILEGED=false

verify: podman info --format '{{.Host.RemoteSocket.Path}}'
