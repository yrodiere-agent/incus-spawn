name: podman
description: Podman container runtime configured for Testcontainers

packages:
  - podman
  - fuse-overlayfs

run:
  - |
    printf '#!/bin/sh\nexec sudo /usr/bin/podman "$@"\n' > /usr/local/bin/podman &&
    chmod +x /usr/local/bin/podman &&
    ln -sf /usr/local/bin/podman /usr/local/bin/docker
  - |
    if grep -q '^#\?mount_program' /etc/containers/storage.conf 2>/dev/null; then
      sed -i 's|^#\?mount_program.*|mount_program = "/usr/bin/fuse-overlayfs"|' /etc/containers/storage.conf
    elif grep -q '^\[storage.options.overlay\]' /etc/containers/storage.conf 2>/dev/null; then
      sed -i '/^\[storage.options.overlay\]/a mount_program = "/usr/bin/fuse-overlayfs"' /etc/containers/storage.conf
    fi
  - |
    systemctl enable --no-reload podman.socket &&
    mkdir -p /run/podman &&
    ln -sf /run/podman/podman.sock /run/docker.sock &&
    ln -sf /run/podman/podman.sock /var/run/docker.sock &&
    printf 'd /run/podman 0755 root root -\nL /run/docker.sock - - - - /run/podman/podman.sock\nL /var/run/docker.sock - - - - /run/podman/podman.sock\n' \
      > /etc/tmpfiles.d/podman-socket.conf &&
    mkdir -p /etc/systemd/system/podman.socket.d &&
    printf '[Socket]\nSocketMode=0666\n' \
      > /etc/systemd/system/podman.socket.d/override.conf

env:
  - name: DOCKER_HOST
    value: unix:///var/run/docker.sock
  - name: TESTCONTAINERS_RYUK_CONTAINER_PRIVILEGED
    value: "false"

verify: podman info --format '{{.Host.RemoteSocket.Path}}'
