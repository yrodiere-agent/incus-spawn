name: idea-backend
description: JetBrains IntelliJ IDEA Remote Development backend 2026.1.3
requires:
  - sshd

packages:
  - tar

parameters:
  memory:
    type: string
    default: "2g"
    description: "JVM heap size (e.g. 2g, 4g, 8g)"
    pattern: "^[0-9]+[gGmM]$"

downloads:
  - url: https://download.jetbrains.com/idea/idea-2026.1.3.tar.gz
    sha256: a6f049716da1d09d9e0ec1500c60bf01a5ff8a0fe2419178dd1ff2fdb2b77563
    extract: /opt
    extract_in_container: true
    arch: x86_64
  - url: https://download.jetbrains.com/idea/idea-2026.1.3-aarch64.tar.gz
    sha256: 7659e791609233c3e6bf67c1bfcc86f5fa1176477ca5815ae6125b0eae84a88b
    extract: /opt
    extract_in_container: true
    arch: aarch64

run:
  - ln -snf /opt/idea-IU-* /opt/idea

run_as_user:
  - |
    IJ_CFG_DIR=~/.config/JetBrains/$(grep -o '"dataDirectoryName": "[^"]*"' /opt/idea/product-info.json | head -1 | cut -d'"' -f4)
    mkdir -p "$IJ_CFG_DIR"
    printf -- '\n-Xmx${param_memory}\n' >> "$IJ_CFG_DIR/idea64.vmoptions"
  - /opt/idea/bin/remote-dev-server.sh registerBackendLocationForGateway
  - |
    IJ_DATA_DIR=~/.local/share/JetBrains/$(grep -o '"dataDirectoryName": "[^"]*"' /opt/idea/product-info.json | head -1 | cut -d'"' -f4)
    IJ_BUILD=$(grep -o '"buildNumber": "[^"]*"' /opt/idea/product-info.json | head -1 | cut -d'"' -f4)
    PLUGIN_DIR="$IJ_DATA_DIR/plugins"
    mkdir -p "$PLUGIN_DIR"
    curl -fSL -o /tmp/index-mcp-plugin.zip "https://plugins.jetbrains.com/plugin/download?pluginId=29174&build=$IJ_BUILD"
    unzip -qo /tmp/index-mcp-plugin.zip -d "$PLUGIN_DIR"
    rm -f /tmp/index-mcp-plugin.zip

verify: test -x /opt/idea/bin/remote-dev-server.sh

actions:
  - label: "Open repo '${repo_name}' in Gateway"
    type: url
    expand: repos
    url: "jetbrains-gateway://connect#idePath=%2Fopt%2Fidea&host=${name}&port=22&user=agentuser&type=ssh&deploy=false&projectPath=${repo_path}"
