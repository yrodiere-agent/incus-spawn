name: Build Appliance Image

on:
  push:
    paths:
      - 'appliance/**'
    branches: [main, MicroVM]
  pull_request:
    paths:
      - 'appliance/**'
  workflow_dispatch:
  workflow_call:
    outputs:
      cache-key:
        description: Cache key for the built appliance image
        value: ${{ jobs.build.outputs.cache-key }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute cache key
        id: cache-key
        run: echo "key=appliance-${{ hashFiles('appliance/**') }}" >> "$GITHUB_OUTPUT"

      - name: Restore cached image
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: appliance/build/
          key: ${{ steps.cache-key.outputs.key }}

      - name: Install build dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-utils podman

      - name: Build appliance image
        if: steps.cache.outputs.cache-hit != 'true'
        run: sudo appliance/build-from-container.sh appliance/build 2G

      - name: Report image size
        run: |
          ls -lh appliance/build/
          qemu-img info appliance/build/incus-spawn-appliance.qcow2

      - name: Cache built image
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: appliance/build/
          key: ${{ steps.cache-key.outputs.key }}

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: appliance-image
          path: appliance/build/
          retention-days: 30
