name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  appliance:
    uses: ./.github/workflows/build-appliance.yml

  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: amd64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: aarch64
          - runner: macos-14
            os: macos
            arch: aarch64
          - runner: macos-15-intel
            os: macos
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        run: git clone --depth 1 --branch $GITHUB_REF_NAME https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Oracle GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false

      - name: Build uber-jar
        if: matrix.os == 'linux' && matrix.arch == 'amd64'
        run: |
          mvn package -Prelease -DskipTests
          cp target/incus-spawn-*-runner.jar target/incus-spawn-runner.jar

      - name: Build native image (Linux)
        if: matrix.os == 'linux'
        run: |
          mvn package -Dnative -DskipTests
          cp target/incus-spawn-*-runner target/incus-spawn-linux-${{ matrix.arch }}

      - name: Build native image (macOS)
        if: matrix.os == 'macos'
        run: |
          mvn package -Dnative -DskipTests -Dmacos.info.plist="$(pwd)/src/main/resources/Info.plist"
          cp target/incus-spawn-*-runner target/incus-spawn-macos-${{ matrix.arch }}

      - name: Upload uber-jar
        if: matrix.os == 'linux' && matrix.arch == 'amd64'
        uses: actions/upload-artifact@v6
        with:
          name: uber-jar
          path: target/incus-spawn-runner.jar

      - name: Upload native binary (Linux)
        if: matrix.os == 'linux'
        uses: actions/upload-artifact@v6
        with:
          name: native-linux-${{ matrix.arch }}
          path: target/incus-spawn-linux-${{ matrix.arch }}

      - name: Upload native binary (macOS)
        if: matrix.os == 'macos'
        uses: actions/upload-artifact@v6
        with:
          name: native-macos-${{ matrix.arch }}
          path: target/incus-spawn-macos-${{ matrix.arch }}

  release:
    needs: [build, appliance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        run: git clone --depth 1 --branch $GITHUB_REF_NAME https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Prepare appliance artifacts
        run: |
          for arch in x86_64 aarch64; do
            dir="artifacts/appliance-${arch}"
            if [ -d "$dir" ]; then
              cp "$dir/vmlinuz" "artifacts/vmlinuz-${arch}"
              cp "$dir/disk.img.gz" "artifacts/disk-${arch}.img.gz"
            fi
          done

      - name: Create GitHub Release
        run: |
          gh release create $GITHUB_REF_NAME \
            artifacts/uber-jar/incus-spawn-runner.jar \
            artifacts/native-linux-amd64/incus-spawn-linux-amd64 \
            artifacts/native-linux-aarch64/incus-spawn-linux-aarch64 \
            artifacts/native-macos-aarch64/incus-spawn-macos-aarch64 \
            artifacts/native-macos-x86_64/incus-spawn-macos-x86_64 \
            artifacts/vmlinuz-x86_64 \
            artifacts/vmlinuz-aarch64 \
            artifacts/disk-x86_64.img.gz \
            artifacts/disk-aarch64.img.gz \
            src/main/resources/git-remote-isx \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        continue-on-error: true
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          SHA_ARM64=$(sha256sum artifacts/native-macos-aarch64/incus-spawn-macos-aarch64 | cut -d' ' -f1)
          SHA_X86_64=$(sha256sum artifacts/native-macos-x86_64/incus-spawn-macos-x86_64 | cut -d' ' -f1)
          GIT_REMOTE_SHA=$(sha256sum src/main/resources/git-remote-isx | cut -d' ' -f1)

          git clone https://x-access-token:${TAP_TOKEN}@github.com/Sanne/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i \
            -e "s/version \"[^\"]*\"/version \"${VERSION}\"/" \
            -e "/macos-aarch64/,/sha256/{s|/v[0-9][^/]*/|/v${VERSION}/|; s/sha256 \"[^\"]*\"/sha256 \"${SHA_ARM64}\"/;}" \
            -e "/macos-x86_64/,/sha256/{s|/v[0-9][^/]*/|/v${VERSION}/|; s/sha256 \"[^\"]*\"/sha256 \"${SHA_X86_64}\"/;}" \
            -e "/resource \"git-remote-isx\"/,/end/{s|url \"[^\"]*\"|url \"https://github.com/Sanne/incus-spawn/releases/download/v${VERSION}/git-remote-isx\"|}" \
            -e "/resource \"git-remote-isx\"/,/end/{s/sha256 \"[^\"]*\"/sha256 \"${GIT_REMOTE_SHA}\"/}" \
            Formula/incus-spawn.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/incus-spawn.rb
          git commit -m "Update incus-spawn to ${VERSION}"
          git push
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Publish to COPR
        continue-on-error: true
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sudo apt-get install -y -qq rpm > /dev/null
          pip install --quiet copr-cli
          mkdir -p ~/.config
          printf '[copr-cli]\nlogin = %s\nusername = %s\ntoken = %s\ncopr_url = https://copr.fedorainfracloud.org\n' \
            "$COPR_LOGIN" "$COPR_USERNAME" "$COPR_TOKEN" > ~/.config/copr
          CHANGELOG="* $(date +'%a %b %d %Y') Sanne Grinovero <sanne@hibernate.org> - ${VERSION}-1\n- See https://github.com/Sanne/incus-spawn/releases/tag/v${VERSION}"
          sed -e "s/@VERSION@/$VERSION/g" -e "s|@CHANGELOG@|$CHANGELOG|g" packaging/incus-spawn.spec > /tmp/incus-spawn.spec
          mkdir -p ~/rpmbuild/{SOURCES,SPECS}
          cp artifacts/native-linux-amd64/incus-spawn-linux-amd64 ~/rpmbuild/SOURCES/
          cp artifacts/native-linux-aarch64/incus-spawn-linux-aarch64 ~/rpmbuild/SOURCES/
          cp src/main/resources/git-remote-isx ~/rpmbuild/SOURCES/
          cp /tmp/incus-spawn.spec ~/rpmbuild/SPECS/
          rpmbuild -bs ~/rpmbuild/SPECS/incus-spawn.spec
          copr-cli build incus-spawn ~/rpmbuild/SRPMS/incus-spawn-*.src.rpm
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}

      - name: Publish to APT repository
        continue-on-error: true
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          if [ -z "$APT_GPG_PRIVATE_KEY" ] || [ -z "$APT_REPO_TOKEN" ]; then
            echo "::warning::APT_GPG_PRIVATE_KEY or APT_REPO_TOKEN secret is not set — skipping APT repository publish"
            exit 0
          fi

          sudo apt-get update -qq > /dev/null
          sudo apt-get install -y -qq dpkg-dev apt-utils > /dev/null

          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --with-colons 2>/dev/null | awk -F: '/^sec:/{print $5; exit}')
          if [ -z "$GPG_KEY_ID" ]; then
            echo "::error::Failed to extract GPG key ID after import — check APT_GPG_PRIVATE_KEY secret"
            exit 1
          fi
          echo "Using GPG key: $GPG_KEY_ID"

          # Generate shell completions (arch-independent) from the amd64 binary
          chmod +x artifacts/native-linux-amd64/incus-spawn-linux-amd64
          COMPLETIONS_DIR=$(mktemp -d)
          artifacts/native-linux-amd64/incus-spawn-linux-amd64 completion bash > "$COMPLETIONS_DIR/isx.bash"
          artifacts/native-linux-amd64/incus-spawn-linux-amd64 completion zsh  > "$COMPLETIONS_DIR/_isx"
          artifacts/native-linux-amd64/incus-spawn-linux-amd64 completion fish > "$COMPLETIONS_DIR/isx.fish"
          for f in "$COMPLETIONS_DIR"/*; do
            if [ ! -s "$f" ]; then
              echo "::error::Shell completion file $f is empty — binary may have failed"
              exit 1
            fi
          done

          # Build .deb for each architecture
          for arch_pair in "amd64:amd64" "aarch64:arm64"; do
            BUILD_ARCH=${arch_pair%%:*}
            DEB_ARCH=${arch_pair##*:}
            PKG_DIR="/tmp/incus-spawn_${VERSION}_${DEB_ARCH}"

            mkdir -p "$PKG_DIR/DEBIAN"
            mkdir -p "$PKG_DIR/usr/bin"
            mkdir -p "$PKG_DIR/usr/share/bash-completion/completions"
            mkdir -p "$PKG_DIR/usr/share/zsh/vendor-completions"
            mkdir -p "$PKG_DIR/usr/share/fish/vendor_completions.d"

            sed -e "s/@VERSION@/$VERSION/" -e "s/@ARCH@/$DEB_ARCH/" \
              packaging/debian/control > "$PKG_DIR/DEBIAN/control"

            install -m 755 "artifacts/native-linux-${BUILD_ARCH}/incus-spawn-linux-${BUILD_ARCH}" "$PKG_DIR/usr/bin/isx"
            install -m 755 src/main/resources/git-remote-isx "$PKG_DIR/usr/bin/git-remote-isx"
            install -m 644 "$COMPLETIONS_DIR/isx.bash" "$PKG_DIR/usr/share/bash-completion/completions/isx"
            install -m 644 "$COMPLETIONS_DIR/_isx" "$PKG_DIR/usr/share/zsh/vendor-completions/_isx"
            install -m 644 "$COMPLETIONS_DIR/isx.fish" "$PKG_DIR/usr/share/fish/vendor_completions.d/isx.fish"

            dpkg-deb --root-owner-group --build "$PKG_DIR"
            echo "Built: $(basename "$PKG_DIR").deb ($(du -h "$PKG_DIR.deb" | cut -f1))"
          done

          # Clone the APT repository
          APT_REPO="Sanne/isx-apt-releases"
          APT_REPO_URL="https://x-access-token:${APT_REPO_TOKEN}@github.com/${APT_REPO}.git"
          APT_DIR="/tmp/apt-repo"
          git clone --depth 1 "$APT_REPO_URL" "$APT_DIR"

          gpg --export --armor "$GPG_KEY_ID" > "$APT_DIR/public.gpg"

          # Copy debs into pool, removing old versions
          mkdir -p "$APT_DIR/pool"
          rm -f "$APT_DIR"/pool/incus-spawn_*.deb
          cp /tmp/incus-spawn_${VERSION}_*.deb "$APT_DIR/pool/"

          # Generate Packages indices
          cd "$APT_DIR"
          for deb_arch in amd64 arm64; do
            mkdir -p "dists/stable/main/binary-${deb_arch}"
            dpkg-scanpackages --arch "$deb_arch" pool 2>/dev/null > "dists/stable/main/binary-${deb_arch}/Packages"
            gzip -9c "dists/stable/main/binary-${deb_arch}/Packages" > "dists/stable/main/binary-${deb_arch}/Packages.gz"
          done

          # Generate and sign Release file
          cd "$APT_DIR/dists/stable"
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="incus-spawn" \
            -o APT::FTPArchive::Release::Label="incus-spawn" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="amd64 arm64" \
            -o APT::FTPArchive::Release::Components="main" \
            release . > Release
          gpg --batch --yes --default-key "$GPG_KEY_ID" -abs -o Release.gpg Release
          gpg --batch --yes --default-key "$GPG_KEY_ID" --clearsign -o InRelease Release

          # Commit and push
          cd "$APT_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update APT repository for v${VERSION}"
          git push
          echo "APT repository published to https://sanne.github.io/isx-apt-releases/"
        env:
          APT_REPO_TOKEN: ${{ secrets.APT_REPO_TOKEN }}
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}

      - name: Update Nixpkgs
        continue-on-error: true
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          # Compute SRI hashes from the release artifacts we already have
          hash_sri() {
            local hex
            hex=$(sha256sum "$1" | cut -d' ' -f1)
            echo "sha256-$(python3 -c "import base64,binascii; print(base64.b64encode(binascii.unhexlify('$hex')).decode())")"
          }

          HASH_AMD64=$(hash_sri artifacts/native-linux-amd64/incus-spawn-linux-amd64)
          HASH_AARCH64=$(hash_sri artifacts/native-linux-aarch64/incus-spawn-linux-aarch64)
          HASH_GIT_REMOTE=$(hash_sri src/main/resources/git-remote-isx)

          # Fork nixpkgs if needed, then clone (shallow)
          gh repo fork NixOS/nixpkgs --clone=false 2>/dev/null || true
          FORK_OWNER=$(gh api user -q .login)
          BRANCH="incus-spawn-${VERSION}"
          PACKAGE_DIR="pkgs/by-name/in/incus-spawn"

          git clone --depth 1 https://github.com/NixOS/nixpkgs.git /tmp/nixpkgs
          cd /tmp/nixpkgs
          git remote add fork "https://x-access-token:${NIXPKGS_TOKEN}@github.com/${FORK_OWNER}/nixpkgs.git"
          git checkout -B "$BRANCH"

          # Write the package
          mkdir -p "$PACKAGE_DIR"
          sed \
            -e "0,/version = \"[^\"]*\"/s/version = \"[^\"]*\"/version = \"$VERSION\"/" \
            -e "/x86_64-linux/,/};/{s|hash = \"[^\"]*\"|hash = \"$HASH_AMD64\"|;}" \
            -e "/aarch64-linux/,/};/{s|hash = \"[^\"]*\"|hash = \"$HASH_AARCH64\"|;}" \
            -e "/git-remote-isx/,/};/{s|hash = \"[^\"]*\"|hash = \"$HASH_GIT_REMOTE\"|;}" \
            "$GITHUB_WORKSPACE/packaging/nix/package.nix" > "$PACKAGE_DIR/package.nix"
          cp "$GITHUB_WORKSPACE/packaging/nix/update.sh" "$PACKAGE_DIR/update.sh"
          chmod +x "$PACKAGE_DIR/update.sh"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$PACKAGE_DIR"

          # Determine commit message based on whether this is init or update
          if git log origin/master --oneline -- "$PACKAGE_DIR" 2>/dev/null | head -1 | grep -q .; then
            COMMIT_MSG="incus-spawn: ${VERSION}"
            PR_TITLE="incus-spawn: update to ${VERSION}"
          else
            COMMIT_MSG="incus-spawn: init at ${VERSION}"
            PR_TITLE="incus-spawn: init at ${VERSION}"
          fi

          git commit -m "$COMMIT_MSG" -m "https://github.com/Sanne/incus-spawn/releases/tag/v${VERSION}"
          git push fork "$BRANCH" --force

          # Open or update PR
          EXISTING_PR=$(gh pr list --repo NixOS/nixpkgs --head "${FORK_OWNER}:${BRANCH}" --json number -q '.[0].number' 2>/dev/null || true)
          printf -v PR_BODY '%s\n\n%s\n%s' \
            '## Summary' \
            "Add/update [incus-spawn](https://github.com/Sanne/incus-spawn) — CLI tool for managing isolated Incus-based development environments." \
            "Pre-built GraalVM native binaries. See [release notes](https://github.com/Sanne/incus-spawn/releases/tag/v${VERSION})."

          if [[ -n "$EXISTING_PR" ]]; then
            gh pr edit "$EXISTING_PR" --repo NixOS/nixpkgs --title "$PR_TITLE" --body "$PR_BODY"
          else
            gh pr create --repo NixOS/nixpkgs \
              --head "${FORK_OWNER}:${BRANCH}" \
              --base master \
              --title "$PR_TITLE" \
              --body "$PR_BODY"
          fi
        env:
          GH_TOKEN: ${{ secrets.NIXPKGS_TOKEN }}
          NIXPKGS_TOKEN: ${{ secrets.NIXPKGS_TOKEN }}
